# ============================================
# GitHub Actions CI/CD Pipeline
# - CI: 테스트 실행, Docker 이미지 빌드
# - CD: ECR 푸시, ECS 배포 (staging → production)
# Requirements: 16.3, 16.4, 16.5
# ============================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  BACKEND_IMAGE: retail-dashboard-backend
  FRONTEND_IMAGE: retail-dashboard-frontend
  ECS_CLUSTER: retail-dashboard-cluster

permissions:
  contents: read
  id-token: write

jobs:
  # ============================================
  # Job 1: 백엔드 테스트
  # ============================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: retail_dashboard_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run backend tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/retail_dashboard_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_pass
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  # ============================================
  # Job 2: 프론트엔드 테스트
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ============================================
  # Job 3: Docker 이미지 빌드 및 ECR 푸시
  # ============================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${IMAGE_TAG} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${IMAGE_TAG} \
                     ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${IMAGE_TAG}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG} \
                     ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  # ============================================
  # Job 4: Staging 배포
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to ECS staging
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }}-staging \
            --service retail-dashboard-backend-staging \
            --force-new-deployment

      - name: Deploy frontend to ECS staging
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }}-staging \
            --service retail-dashboard-frontend-staging \
            --force-new-deployment

      - name: Wait for staging deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }}-staging \
            --services retail-dashboard-backend-staging retail-dashboard-frontend-staging

  # ============================================
  # Job 5: Production 배포 (수동 승인 필요)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to ECS production
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service retail-dashboard-backend \
            --force-new-deployment

      - name: Deploy frontend to ECS production
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service retail-dashboard-frontend \
            --force-new-deployment

      - name: Wait for production deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services retail-dashboard-backend retail-dashboard-frontend
