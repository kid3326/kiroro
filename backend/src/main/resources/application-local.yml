spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/retail_dashboard
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true

logging:
  level:
    root: INFO
    com.retaildashboard: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
